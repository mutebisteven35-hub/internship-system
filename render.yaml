services:
  - type: web
    name: iles-backend
    runtime: python
    buildCommand: bash backend/build.sh
    startCommand: cd backend && gunicorn iles_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://iles-frontend.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://iles-frontend.onrender.com,https://iles-backend.onrender.com"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: iles-postgres
          property: connectionString

  - type: web
    name: iles-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://iles-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: iles-postgres
    databaseName: iles
    user: iles
